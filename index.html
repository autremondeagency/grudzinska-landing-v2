    <script type="application/ld+json">

        {
          "@type": "Question",
          "name": "Ile kosztuje współpraca z dietetykiem bariatrycznym?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pierwsza rozmowa jest całkowicie darmowa — 15-20 minut, żebyśmy mogły się poznać i zobaczyć, czy mogę Ci pomóc. Dalszą współpracę i pakiety opieki omawiam indywidualnie, bo każda sytuacja jest inna."
          }
        },
        {
          "@type": "Question",
          "name": "Jak długo trwa przygotowanie do operacji bariatrycznej?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Zwykle pracujemy razem od 2 do 6 miesięcy przed operacją. To zależy od terminu zabiegu, od tego ile trzeba schudnąć i od Twojego zdrowia."
          }
        },
        {
          "@type": "Question",
          "name": "Czy konsultacje dietetyczne mogą być online?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tak, większość moich pacjentek pracuje ze mną zdalnie. Spotykamy się na wideokonsultacji — potrzebujesz tylko telefonu lub komputera. Działa to tak samo dobrze jak spotkanie na żywo."
          }
        },
        {
          "@type": "Question",
          "name": "Czy pomagasz też po operacji bariatrycznej?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tak, i uważam, że to kluczowy etap. Pierwsze miesiące po zabiegu to dieta płynna, papkowata, potem stopniowe rozszerzanie. Wspieram Cię dietetycznie i psychologicznie."
          }
        },
        {
          "@type": "Question",
          "name": "Czy muszę być już po decyzji o operacji bariatrycznej?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nie. Dużo moich pacjentek przychodzi na etapie rozważania. Pomagam uporządkować informacje, rozważyć opcje i podjąć świadomą decyzję."
          }
        },
        {
          "@type": "Question",
          "name": "Czym różni się dietetyk bariatryczny od zwykłego dietetyka?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Specjalizuję się w żywieniu bariatrycznym. Pracuję z mechanizmami jedzenia emocjonalnego, z uzależnieniem od dopaminy, z konkretnymi wymaganiami dietetycznymi przed i po zabiegu. Jestem jedną z niewielu specjalistek w Polsce łączących te obszary."
          }
        },
        {
          "@type": "Question",
          "name": "Nie mieszkam w Legionowie. Czy to problem?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "W ogóle nie. Pracuję z pacjentkami z całej Polski i nie tylko. Wszystko odbywa się online — konsultacje, jadłospisy, wsparcie między spotkaniami."
          }
        }
      ]
